name: Daily Research Log

on:
  push:
    paths-ignore:
      - "Idea_DataBase/*.md"
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  generate-daily-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name || github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily research log
        run: python Auto_Github/scripts/generate_daily_log.py

      - name: Commit generated logs if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- Idea_DataBase)" ]; then
            echo "No log changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Idea_DataBase
          git commit -m "chore: update daily research log"
          git push origin HEAD:${{ github.ref_name || github.event.repository.default_branch }}
